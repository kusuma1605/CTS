<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Preferences</title>
</head>
<body>

    <h1>Save Preferred Event</h1>

    <label>Select Event:</label>
    <select id="eventType">
        <option value="">Select Event</option>
        <option value="Music">Music</option>
        <option value="Sports">Sports</option>
        <option value="Art">Art</option>
    </select>

    <button onclick="savePreference()">Save Preference</button>
    <button onclick="clearPreference()">Clear Preferences</button>

    <p id="message"></p>

    <script>
        window.onload = function() {
            var savedEvent = localStorage.getItem("preferredEvent");

            if (savedEvent) {
                document.getElementById("eventType").value = savedEvent;
                document.getElementById("message").innerHTML =
                    "Saved preference loaded: " + savedEvent;
            }
        };

        function savePreference() {
            var eventType = document.getElementById("eventType").value;

            localStorage.setItem("preferredEvent", eventType);
            sessionStorage.setItem("sessionEvent", eventType);

            document.getElementById("message").innerHTML =
                "Preference saved successfully!";
        }

        function clearPreference() {
            localStorage.clear();
            sessionStorage.clear();

            document.getElementById("eventType").value = "";
            document.getElementById("message").innerHTML =
                "Preferences cleared successfully!";
        }
    </script>

</body>
</html>
