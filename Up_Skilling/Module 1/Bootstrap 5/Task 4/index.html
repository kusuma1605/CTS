<!DOCTYPE html>
<html>
<head>
    <title>Column Layouts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">
    <div class="row mb-4">
        <div class="col-md-3 bg-dark text-white p-4">Sidebar</div>
        <div class="col-md-9 bg-light p-4">Main Content Area</div>
    </div>

    <div class="row">
        <div class="col-sm-3 bg-primary text-white p-3">One</div>
        <div class="col-sm-3 bg-success text-white p-3">Two</div>
        <div class="col-sm-3 bg-warning p-3">Three</div>
        <div class="col-sm-3 bg-danger text-white p-3">Four</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
