<!DOCTYPE html>
<html>
<head>
    <title>Bootstrap Sass Customization</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h1 class="text-primary">Bootstrap Sass Customization</h1>

<p>
    To customize Bootstrap with Sass:
</p>

<ol>
    <li>Install Bootstrap using npm.</li>
    <li>Create a custom SCSS file.</li>
    <li>Change variables like primary color and border radius.</li>
    <li>Recompile Bootstrap CSS.</li>
</ol>

<div class="alert alert-info">
    Example variable changes:
    <br>
    $primary: purple;
    <br>
    $border-radius: 20px;
</div>

<button class="btn btn-primary rounded-pill">Customized Button Example</button>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
