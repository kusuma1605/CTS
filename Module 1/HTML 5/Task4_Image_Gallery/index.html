<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image Gallery</title>

    <style>
        .eventImage {
            width: 200px;
            height: 130px;
            border: 3px solid black;
        }

        table {
            border-spacing: 20px;
        }

        td {
            text-align: center;
        }
    </style>
</head>
<body>

    <table>
        <caption><h2>Community Event Gallery</h2></caption>

        <tr>
            <td>
                <img src="https://via.placeholder.com/200" class="eventImage" alt="Music Event" title="Music Event">
                <p>Music Event</p>
            </td>
            <td>
                <img src="https://via.placeholder.com/200" class="eventImage" alt="Sports Event" title="Sports Event">
                <p>Sports Event</p>
            </td>
            <td>
                <img src="https://via.placeholder.com/200" class="eventImage" alt="Food Festival" title="Food Festival">
                <p>Food Festival</p>
            </td>
        </tr>

        <tr>
            <td>
                <img src="https://via.placeholder.com/200" class="eventImage" alt="Art Event" title="Art Event">
                <p>Art Event</p>
            </td>
            <td>
                <img src="https://via.placeholder.com/200" class="eventImage" alt="Tree Plantation" title="Tree Plantation">
                <p>Tree Plantation</p>
            </td>
            <td>
                <img src="https://via.placeholder.com/200" class="eventImage" alt="Charity Run" title="Charity Run">
                <p>Charity Run</p>
            </td>
        </tr>
    </table>

</body>
</html>
