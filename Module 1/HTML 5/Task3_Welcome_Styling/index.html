<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome Banner</title>

    <style>
        #welcomeBanner {
            background-color: blue;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .highlight {
            background-color: yellow;
            padding: 5px;
        }
    </style>
</head>
<body>

    <div id="welcomeBanner">
        <h1>Welcome, Resident!</h1>
        <p>Register for upcoming community events.</p>
    </div>

    <p class="highlight">Important: Registration closes soon.</p>

    <p>
        Special Offer:
        <span style="color:red; font-weight:bold;">
            Free entry for early registration!
        </span>
    </p>

</body>
</html>
