<!DOCTYPE html>
<html>
<head>
    <title>Bootstrap JS Bundle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h1>Bootstrap Files</h1>
    <p>CSS folder contains styles, JS folder contains plugins, Icons folder contains icons.</p>

    <button class="btn btn-primary" data-bs-toggle="collapse" data-bs-target="#demo">
        Show Bootstrap JS
    </button>

    <div id="demo" class="collapse mt-3 alert alert-info">
        Bootstrap JavaScript bundle is working.
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
