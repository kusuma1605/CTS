<!DOCTYPE html>
<html>
<head>
    <title>Alignment and Reordering</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">
    <div class="row justify-content-center align-items-center bg-light" style="height:200px;">
        <div class="col-4 bg-primary text-white text-center p-4">
            Centered Content
        </div>
    </div>

    <div class="row mt-4">
        <div class="col-md-6 order-md-2 bg-success text-white p-4">
            First in mobile, Second in desktop
        </div>
        <div class="col-md-6 order-md-1 bg-warning p-4">
            Second in mobile, First in desktop
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
