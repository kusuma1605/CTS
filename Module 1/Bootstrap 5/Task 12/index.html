<!DOCTYPE html>
<html>
<head>
    <title>Spacing Utilities</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<section class="m-3 mt-4 p-2 py-5 bg-light">
    <h1>Spacing Utilities</h1>
    <p>This section uses margin and padding classes.</p>
</section>

<div class="container">
    <h2 class="text-center mb-4">Pricing Section</h2>

    <div class="row">
        <div class="col-md-4 mb-3">
            <div class="card p-4">
                <h3>Basic</h3>
                <p>₹100</p>
                <button class="btn btn-primary">Buy</button>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card p-4">
                <h3>Standard</h3>
                <p>₹200</p>
                <button class="btn btn-success">Buy</button>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card p-4">
                <h3>Premium</h3>
                <p>₹300</p>
                <button class="btn btn-danger">Buy</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
