<!DOCTYPE html>
<html>
<head>
    <title>Cards and Media</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<div class="card" style="width: 18rem;">
    <img src="https://via.placeholder.com/300" class="card-img-top" alt="Profile">
    <div class="card-body">
        <h5 class="card-title">Kusuma Kesari</h5>
        <p class="card-text">Community Event Volunteer</p>
        <button class="btn btn-primary">View Profile</button>
    </div>
</div>

<hr>

<div class="d-flex align-items-start">
    <img src="https://via.placeholder.com/100" class="me-3" alt="Event">
    <div>
        <h5>Media Object Layout</h5>
        <p>This layout places an image on the left and content on the right.</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
