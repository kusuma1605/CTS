<!DOCTYPE html>
<html>
<head>
    <title>Display and Visibility</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <div class="d-none d-md-block bg-primary text-white p-3">
        This is hidden on mobile and visible on tablets and above.
    </div>

    <div class="d-none d-lg-flex bg-success text-white p-3 mt-3">
        This appears as flex only on large screens.
    </div>

    <div class="row mt-4">
        <div class="col-md-3 d-none d-md-block bg-dark text-white p-3">
            Sidebar visible on tablet and above
        </div>

        <div class="col-md-9 bg-light p-3">
            Main Content
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
