<!DOCTYPE html>
<html>
<head>
    <title>Borders and Shadows</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<img src="https://via.placeholder.com/150" class="border border-primary border-3 rounded-circle" alt="Profile">

<div class="card shadow-lg rounded-pill mt-5 p-4">
    <div class="card-body">
        <h4>Shadow Card</h4>
        <p>This card uses shadow-lg and rounded-pill.</p>
    </div>
</div>

<div class="card shadow mt-4 p-4">
    <p>This card uses normal shadow.</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
