# Automating deployment with Docker (and a stepping stone toward Kubernetes) sub-topic
version: "3.9"
services:
  productservice:
    build: ./ProductService
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  orderservice:
    build: ./OrderService
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ProductServiceUrl=http://productservice:8080
    depends_on:
      - productservice
